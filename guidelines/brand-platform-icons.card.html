<!-- @dsCard group="Brand" viewport="700x150" name="Lab platform icons" subtitle="Product marks — use as avatar/badge or in product nav" -->
<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 24px; background: var(--bg); }
  .row { display: flex; gap: 16px; align-items: center; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .icon-wrap { width: 48px; height: 48px; border-radius: var(--r-lg); overflow: hidden; display:flex;align-items:center;justify-content:center;border:1px solid var(--line-2); }
  .icon-wrap img { width: 40px; height: 40px; object-fit: contain; }
  .name { font-size: 11px; font-weight: 600; font-family: var(--font-display); color: var(--fg2); }
</style>
</head>
<body>
<div class="row">
  <div class="item"><div class="icon-wrap"><img src="../brand/platform-icons/markus.svg" alt="Markus"></div><div class="name">Markus</div></div>
  <div class="item"><div class="icon-wrap"><img src="../brand/platform-icons/luca.svg" alt="Luca"></div><div class="name">Luca</div></div>
  <div class="item"><div class="icon-wrap"><img src="../brand/platform-icons/barbara.svg" alt="Bárbara"></div><div class="name">Bárbara</div></div>
  <div class="item"><div class="icon-wrap"><img src="../brand/platform-icons/haruka.svg" alt="Haruka"></div><div class="name">Haruka</div></div>
  <div class="item"><div class="icon-wrap"><img src="../brand/platform-icons/teresa.svg" alt="Teresa"></div><div class="name">Teresa</div></div>
</div>
</body>
</html>
