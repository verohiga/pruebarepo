<!-- @dsCard group="Brand" viewport="700x200" name="Lab product characters" subtitle="Markus · Luca · Bárbara · Haruka · Teresa — illustrations" -->
<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 24px; background: var(--bg); }
  .row { display: flex; gap: 12px; align-items: flex-end; }
  .item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .char-wrap { width: 80px; height: 80px; border-radius: var(--r-xl); overflow: hidden; display:flex;align-items:center;justify-content:center; border: 1px solid var(--line-2); }
  .char-wrap img { width: 72px; height: 72px; object-fit: contain; }
  .name { font-size: 12px; font-weight: 600; font-family: var(--font-display); color: var(--fg1); }
  .accent-dot { width: 10px; height: 10px; border-radius: 99px; }
</style>
</head>
<body>
<div class="row">
  <div class="item">
    <div class="char-wrap" style="background:#84FF5810;"><img src="../brand/characters/markus.svg" alt="Markus"></div>
    <div class="name">Markus</div>
    <div class="accent-dot" style="background:#84FF58;"></div>
  </div>
  <div class="item">
    <div class="char-wrap" style="background:#FFCB2610;"><img src="../brand/characters/luca.svg" alt="Luca"></div>
    <div class="name">Luca</div>
    <div class="accent-dot" style="background:#FFCB26;"></div>
  </div>
  <div class="item">
    <div class="char-wrap" style="background:#00F2A910;"><img src="../brand/characters/barbara.svg" alt="Bárbara"></div>
    <div class="name">Bárbara</div>
    <div class="accent-dot" style="background:#00F2A9;"></div>
  </div>
  <div class="item">
    <div class="char-wrap" style="background:#00F9FF10;"><img src="../brand/characters/haruka.svg" alt="Haruka"></div>
    <div class="name">Haruka</div>
    <div class="accent-dot" style="background:#00F9FF;"></div>
  </div>
  <div class="item">
    <div class="char-wrap" style="background:#9D6DFB10;"><img src="../brand/characters/teresa.svg" alt="Teresa"></div>
    <div class="name">Teresa</div>
    <div class="accent-dot" style="background:#9D6DFB;"></div>
  </div>
</div>
</body>
</html>
