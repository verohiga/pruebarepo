<!-- @dsCard group="Type" viewport="700x160" name="Mono — JetBrains Mono" subtitle="Technical values, IDs, code — 400 & 500 only" -->
<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 24px; background: var(--bg); }
  .row { display: flex; align-items: baseline; gap: 20px; padding: 8px 0; border-bottom: 1px solid var(--line-2); }
  .row:last-child { border: none; }
  .label { width: 60px; flex-shrink: 0; font-size: 10px; font-weight: 600; font-family: var(--font-mono); color: var(--fg4); }
  .spec  { width: 90px; flex-shrink: 0; font-size: 10px; color: var(--fg4); font-family: var(--font-mono); }
  .sample { flex: 1; }
</style>
</head>
<body>
  <div class="row">
    <div class="label">400</div>
    <div class="spec">12.5px regular</div>
    <div class="sample"><code style="font-family:var(--font-mono);font-size:12.5px;font-weight:400;background:transparent;padding:0;border-radius:0;color:var(--fg2);">CMP-2024-Q2-LKD-0042 · ROAS: 5.20 · CPL: €8.20 · 0.00187 CTR</code></div>
  </div>
  <div class="row">
    <div class="label">500</div>
    <div class="spec">12.5px medium</div>
    <div class="sample"><code style="font-family:var(--font-mono);font-size:12.5px;font-weight:500;background:transparent;padding:0;border-radius:0;color:var(--fg1);">--accent: #C5E818; --r-xl: 14px; --shadow-e1: 0 1px 2px rgba(16,24,40,.04);</code></div>
  </div>
  <div class="row">
    <div class="label">inline</div>
    <div class="spec">inline code</div>
    <div class="sample"><span style="font-family:var(--font-ui);font-size:13px;color:var(--fg2);">Añade el token <code>--accent</code> al botón primario y usa <code>tabular-nums</code> en todos los números.</span></div>
  </div>
</body>
</html>
