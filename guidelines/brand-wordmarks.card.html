<!-- @dsCard group="Brand" viewport="700x180" name="Wordmarks & favicon" subtitle="newno-wordmark · dark variant · N monogram" -->
<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 0; background: var(--bg); display:flex;align-items:stretch; height:180px; }
  .panel { flex: 1; display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:24px; }
  .panel + .panel { border-left: 1px solid var(--line-2); }
  .panel--dark { background: #0A0B0D; }
  .fname { font-size: 10px; font-weight: 600; font-family: var(--font-mono); color: var(--fg4); }
  .panel--dark .fname { color: rgba(248,248,246,.4); }
  img, object { max-height: 36px; max-width: 140px; }
</style>
</head>
<body>
<div class="panel">
  <img src="../brand/newno-wordmark.svg" alt="Newno wordmark" style="max-height:32px;">
  <div class="fname">newno-wordmark.svg · light</div>
</div>
<div class="panel panel--dark">
  <img src="../brand/newno-wordmark-dark.svg" alt="Newno wordmark dark" style="max-height:32px;">
  <div class="fname" style="color:rgba(248,248,246,.4);">newno-wordmark-dark.svg · dark</div>
</div>
<div class="panel">
  <img src="../brand/newno-favicon.svg" alt="Newno favicon" style="max-height:44px;">
  <div class="fname">newno-favicon.svg · monograma N</div>
</div>
</body>
</html>
