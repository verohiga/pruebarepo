<div id="root"></div>
<script type="text/babel">
const { NavItem } = window.DesignSystem_7929a3;
const { useState } = React;

const NAV = [
  ['home',      'Resumen',    'iconoir:home-simple'],
  ['campaigns', 'Campañas',   'iconoir:megaphone'],
  ['insights',  'Insights',   'iconoir:graph-up'],
  ['channels',  'Canales',    'iconoir:globe'],
  ['audiences', 'Audiencias', 'iconoir:group'],
  ['settings',  'Ajustes',    'iconoir:settings'],

function Preview() {
  const [active, setActive] = useState('home');
  return (
    <div style={{display:'flex',gap:24}}>
      <div style={{width:200,background:'white',border:'1px solid var(--line)',borderRadius:'var(--r-xl)',padding:'16px 12px',display:'flex',flexDirection:'column',gap:2}}>

          <NavItem
            key={k}
            icon={<iconify-icon icon={icon} width="18" height="18"/>}
            label={label}
            active={active === k}
            onClick={() => setActive(k)}
          />
        ))}
        <div style={{marginTop:'auto',paddingTop:12,borderTop:'1px solid var(--line-2)',display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:32,height:32,borderRadius:10,background:'var(--accent)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--font-display)',fontWeight:800,fontSize:13,color:'var(--accent-ink)',flexShrink:0}}>A</div>

      <div style={{flex:1}}>

          <NavItem icon={<iconify-icon icon="iconoir:home-simple" width="18" height="18"/>} label="Activo" active={true}/>
          <NavItem icon={<iconify-icon icon="iconoir:megaphone" width="18" height="18"/>} label="Inactivo" active={false}/>
          <NavItem icon={<iconify-icon icon="iconoir:settings" width="18" height="18"/>} label="Sin icono" active={false}/>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Preview/>);
</script>
